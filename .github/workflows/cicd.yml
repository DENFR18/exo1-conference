name: CI/CD — Build, Test, Scan, Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Tests unitaires
  # ─────────────────────────────────────────
  test:
    name: Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: npm install

      - name: Exécution des tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2 : Build image Docker + Scan Trivy
  # ─────────────────────────────────────────
  security-scan:
    name: Docker Build + Scan Trivy
    runs-on: ubuntu-latest
    needs: test  # Ne démarre que si les tests passent

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t demo-app:${{ github.sha }} .

      - name: Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo-app:${{ github.sha }}
          format: table
          exit-code: '0'          # Rapport uniquement, ne bloque pas le pipeline
          severity: CRITICAL,HIGH
          ignore-unfixed: true    # Ignore les vulnérabilités sans patch disponible

  # ─────────────────────────────────────────
  # JOB 3 : Push sur Docker Hub
  # (uniquement sur push main, pas sur PR)
  # ─────────────────────────────────────────
  push:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan  # Ne démarre que si le scan est OK
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push avec tag versionné
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demo-app:latest
            ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}
